<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#09090b" />

		<!-- Favicon -->
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/favicon.png" />

		<!-- SEO -->
		<title>MintMVP Console</title>
		<meta name="description" content="MintMVP Console — client dashboard for projects, specs, tasks, tests, GitHub and CI, monitoring, finance, and incidents." />
		<meta name="robots" content="noindex, nofollow" />

		<!-- Open Graph -->
		<meta property="og:title" content="MintMVP Console" />
		<meta property="og:description" content="Client dashboard for MintMVP projects." />
		<meta property="og:image" content="/favicon.png" />
		<meta property="og:type" content="website" />

		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="tap"
		data-sveltekit-preload-code
		style="background-color: #09090b; color: #fafafa"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
